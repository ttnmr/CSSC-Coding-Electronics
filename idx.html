<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Sensor Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta http-equiv="refresh" content="5">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 15px; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .stat-value { font-size: 3rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container py-5">
    <header class="pb-3 mb-4 border-bottom">
        <span class="fs-4">Raspberry Pi Real-Time Monitor</span>
    </header>

    <div class="row text-center">
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm bg-primary text-white">
                <div class="card-body">
                    <h5 class="text-uppercase">Temperature</h5>
                    <div class="stat-value">{{ temp }}°C</div>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-4">
            <div class="card shadow-sm bg-success text-white">
                <div class="card-body">
                    <h5 class="text-uppercase">Humidity</h5>
                    <div class="stat-value">{{ humidity }}%</div>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-4">
            <div class="card shadow-sm bg-dark text-white">
                <div class="card-body">
                    <h5 class="text-uppercase">Pressure</h5>
                    <div class="stat-value">{{ pressure }} hPa</div>
                </div>
            </div>
        </div>
    </div>

    <footer class="pt-3 mt-4 text-muted border-top text-center">
        Last updated: Just now (Auto-refreshes every 5s)
    </footer>
</div>

</body>
</html>
